server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /up {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Static assets (cache aggressively) ────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Widget script endpoint — no caching ────────────────────────────────────
    location ~* /widget/[^/]+/script {
        try_files $uri $uri/ /index.php?$query_string;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # ── Main Laravel router ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout    120;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
        fastcgi_intercept_errors off;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block direct access to sensitive files ─────────────────────────────────
    location ~* (composer\.json|composer\.lock|package\.json|\.env) {
        deny all;
    }
}
